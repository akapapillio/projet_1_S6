<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Hôtels</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>
<main class="container">
    <h1 class="page-title">🏨 Gestion des Hôtels</h1>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>ID Lieu</th>
                    <th>Nom Hôtel</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="hotel : ${lieux}">
                    <td th:text="${hotel.idHotel}"></td>
                    <td th:text="${hotel.idLieu}"></td>
                    <td th:text="${hotel.nomHotel}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="grid">
        <!-- Modifier -->
        <div class="form-section card">
            <h2>Modifier un Hôtel</h2>
            <form th:action="@{/hotels/update}" method="post">
                <div class="form-group">
                    <label>Choisir un hôtel :</label>
                    <select name="idHotel" required>
                        <option value="">-- Sélectionner --</option>
                        <option th:each="hotel : ${lieux}" th:value="${hotel.idHotel}" th:text="${hotel.nomHotel}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>ID Lieu :</label>
                    <input type="number" name="idLieu" required>
                </div>
                <div class="form-group">
                    <label>Nom Hôtel :</label>
                    <input type="text" name="nomHotel" required>
                </div>
                <button type="submit" class="btn btn-primary">Mettre à jour</button>
            </form>
        </div>

        <!-- Ajouter -->
        <div class="form-section card">
            <h2>Ajouter un Hôtel</h2>
            <form th:action="@{/hotels/save}" method="post">
                <div class="form-group">
                    <label>ID Lieu :</label>
                    <input type="number" name="idLieu" required>
                </div>
                <div class="form-group">
                    <label>Nom Hôtel :</label>
                    <input type="text" name="nomHotel" required>
                </div>
                <button type="submit" class="btn btn-primary">Ajouter au système</button>
            </form>
        </div>
    </div>
</main>
<footer>
    © 2026 Workflow Réservations – Tous droits réservés
</footer>
</body>
</html>
