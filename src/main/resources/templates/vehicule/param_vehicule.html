<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Paramètres Véhicule</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>
<main class="container">
    <h1 class="page-title">⚙️ Paramètres Véhicule</h1>

    <!-- Affichage des valeurs actuelles -->
    <div class="card">
        <table>
            <tr>
                <th>Vitesse Moyenne</th>
        <td class="text-bold"><span th:text="${paramv.vitessMoyenne}">40</span> <small>km/h</small></td>
            </tr>
            <tr>
                <th>Temps d'Attente</th>
        <td class="text-bold"><span th:text="${paramv.tempsAttente}">10</span> <small>min</small></td>
            </tr>
        </table>
    </div>

    <!-- Formulaire de mise à jour -->
    <form method="post" th:action="@{/param_vehicule/save}">
        <div class="form-group">
            <label>Nouvelle Vitesse Moyenne (km/h)</label>
            <input type="number" name="vitessMoyenne" th:value="${paramv.vitessMoyenne}" required>
        </div>
        
        <div class="form-group">
            <label>Nouveau Temps d'Attente (min)</label>
            <input type="number" name="tempsAttente" th:value="${paramv.tempsAttente}" required>
        </div>
        
        <button type="submit" class="btn btn-primary">Enregistrer les modifications</button>
    </form>
</main>
<footer>
    © 2026 Workflow Réservations – Tous droits réservés
</footer>
</body>
</html>
