<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Assignation des Véhicules</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>
<main class="container">
    <h1 class="page-title">🎯 Assignation Optimale</h1>

    <h2>Réservations en attente</h2>
    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Client</th>
                    <th>Passagers</th>
                    <th>Date d'arrivée</th>
                    <th>Hôtel</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="r : ${reservations}">
                    <td class="text-bold" th:text="${r.nomClient}"></td>
                    <td><span class="badge" th:text="${r.nbPassager} + ' pers.'"></span></td>
                    <td th:text="${r.dateHeureArrivee}"></td>
                    <td th:text="${r.nomHotel}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="action-bar">
        <form th:action="@{/assignation/lancer}" method="post">
            <button type="submit" class="btn btn-primary">⚡ Lancer l'algorithme</button>
        </form>
    </div>

    <h2>Résultat des assignations</h2>
    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Véhicule</th>
                    <th>Capacité</th>
                    <th>Carburant</th>
                    <th>Passagers assignés</th>
                    <th>Itinéraire</th>
                    <th>Planning</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="a : ${assignations}">
                    <td class="text-bold" th:text="${a.nomVehicule}"></td>
                    <td th:text="${a.nbPlace} + ' places'"></td>
                    <td class="fuel-indicator" th:text="${a.carburant} + 'L'"></td>
                    <td>
                        <span class="badge" th:text="${#strings.arrayJoin(a.clients, ', ')}"></span>
                    </td>
                    <td>
                        <small th:text="${#strings.arrayJoin(a.lieux, ' → ')}"></small>
                    </td>
                    <td>
                        <div class="text-muted" style="font-size: 0.8rem;">
                            Départ: <span th:text="${a.dateHeureDepart}"></span><br>
                            Retour: <span th:text="${a.dateHeureRetour}"></span>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
<footer>
    © 2026 Workflow Réservations – Tous droits réservés
</footer>
</body>
</html>
