<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des Réservations</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header th:replace="~{fragments/header :: header}"></header>
    <main class="container">
        <h1 class="page-title">📋 Liste des Réservations</h1>
    
        <!-- Filtres -->
        <div class="card filters">
            <form th:action="@{/reservation/liste}" method="get" class="form-inline">
                <div class="form-group">
                    <label for="date">Date :</label>
                    <input type="date" id="date" name="date" th:value="${date}">
                </div>
                <div class="form-group">
                    <label for="heure">Heure :</label>
                    <input type="time" id="heure" name="heure" th:value="${heure}">
                </div>
                <button type="submit" class="btn btn-primary">Filtrer</button>
        <a th:href="@{/reservation/liste}" class="btn btn-secondary">Réinitialiser</a>
            </form>
        </div>
    
        <div th:if="${error}" class="error" th:text="${error}"></div>
    
        <!-- Tableau des réservations -->
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Client</th>
                        <th>Hôtel</th>
                        <th>Passagers</th>
                        <th>Date/Heure Arrivée</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="reservation : ${reservations}">
                        <td th:text="${reservation.idReservation}"></td>
                        <td th:text="${reservation.nomClient}"></td>
                        <td th:text="${reservation.nomHotel}"></td>
                        <td th:text="${reservation.nbPassager}"></td>
                        <td th:text="${reservation.dateHeureArrivee}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(reservations)}">
                        <td colspan="5" class="luxury-empty">Aucune réservation trouvée</td>
                    </tr>
                </tbody>
            </table>
        </div>
    
        <a th:href="@{/reservation/formulaire}" class="btn btn-primary">Créer une nouvelle réservation</a>
    </main>
    <footer>
        © 2026 Workflow Réservations – Tous droits réservés
    </footer>
</body>
</html>
